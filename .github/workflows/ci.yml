name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout contracts (shared dependencies)
        run: git clone --depth 1 https://github.com/ArchLens-Fiap/archlens-contracts.git ../archlens-contracts

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ArchLens.Orchestrator.sln

      - name: Build
        run: dotnet build ArchLens.Orchestrator.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test ArchLens.Orchestrator.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage;Format=opencover" --results-directory ./coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/**/coverage.opencover.xml

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Check SONAR_TOKEN
        id: check-token
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check-token.outputs.skip != 'true'

      - name: Checkout contracts (shared dependencies)
        if: steps.check-token.outputs.skip != 'true'
        run: git clone --depth 1 https://github.com/ArchLens-Fiap/archlens-contracts.git ../archlens-contracts

      - name: Setup .NET
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java 17
        if: steps.check-token.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install SonarScanner
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarScanner Begin
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet sonarscanner begin /k:"ArchLens-Fiap_archlens-orchestrator-service" /o:"archlens-fiap" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml"

      - name: Build
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet build ArchLens.Orchestrator.sln --configuration Release

      - name: Test
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet test ArchLens.Orchestrator.sln --configuration Release --collect:"XPlat Code Coverage;Format=opencover" --results-directory ./coverage

      - name: SonarScanner End
        if: steps.check-token.outputs.skip != 'true'
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
